name: 'Deploy Helm Chart via Script'
description: 'A reusable GitHub Action to deploy a Helm chart by running a provided bash script.'

inputs:
  target_environment:
    description: 'The environment to target with this deploy'
    required: true
  release_name:
    description: 'The Helm release name.'
    required: true
  namespace:
    description: 'The Kubernetes namespace to deploy into.'
    required: false
    default: 'app'
  chart_path:
    description: 'Path to the helm chart.'
    required: true
  working_directory:
    description: 'The working directory in the application repo'
    required: false
    default: 'misc/chart'
  script_args:
    description: 'Additional arguments to pass to the deployment script.'
    required: false
runs:
  using: 'composite'
  steps:
    - name: 'Run our common Helm deploy script'
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: |
        set -x
        ${{ github.action_path }}/common-helm-deploy.sh \
             --override-namespace "${{ inputs.namespace }}" \
             --override-chart "${{ inputs.chart_path }}" \
             ${{ inputs.target_environment }} ${{ inputs.release_name }} \
             ${{ inputs.script_args }}

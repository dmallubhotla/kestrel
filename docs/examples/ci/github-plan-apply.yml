# Example: PR plan -> apply-on-merge for kestci, GitHub-hosted runners.
#
# Scope: PUBLIC-API terraform stacks only (internet-reachable providers like
# Cloudflare, AWS SES). Do NOT use a hosted runner for LAN/foundational stacks
# (cluster foundation, in-cluster) — see docs/ci.md "Match CI to the blast radius".
#
# Prereqs:
#   - .kestconfig committed at the repo root (command + iac_dir).
#   - GitHub OIDC -> an AWS role (AWS_CI_ROLE_ARN) whose trust policy is scoped
#     to this repo and (for apply) ref=refs/heads/master. That trust policy is
#     the authority boundary — kestci does not gate branches itself.
#   - Provider tokens as repo/environment secrets.
name: terraform
on:
  pull_request:
    paths: ["iac-live/**"]
  push:
    branches: [master]
    paths: ["iac-live/**"]
permissions:
  id-token: write # mint the OIDC token for AWS
  contents: read
env:
  # Provider credentials (not AWS — those come from OIDC below).
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
jobs:
  plan:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    # One job per root: kestci takes a single target, so fan out rather than
    # globbing. Keep this list to the public-API stacks only.
    strategy:
      fail-fast: false
      matrix:
        root: [cloudflare, ses-smtp]
    container:
      image: ghcr.io/dmallubhotla/kestrel:latest
      # The image runs as the `kest` user; if checkout/tofu hit permission
      # errors on the workspace, add: options: --user root
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ secrets.AWS_CI_ROLE_ARN }}
          aws-region: us-east-2
      # CI=true is set automatically by Actions, satisfying kestci's CI guard.
      # Credentials are ambient (OIDC); kestci echoes the expected account/role.
      - run: kestci init "${{ matrix.root }}"
      - run: kestci plan "${{ matrix.root }}"
  apply:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    # Optional human gate: point this at a protected GitHub Environment with
    # required reviewers to require approval before apply.
    environment: production
    strategy:
      fail-fast: false
      matrix:
        root: [cloudflare, ses-smtp]
    container:
      image: ghcr.io/dmallubhotla/kestrel:latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ secrets.AWS_CI_ROLE_ARN }}
          aws-region: us-east-2
      # kestci enforces a clean worktree on apply (no --force in CI).
      - run: kestci init "${{ matrix.root }}"
      - run: kestci apply "${{ matrix.root }}"

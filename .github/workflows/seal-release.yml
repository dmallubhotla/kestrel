name: seal
on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Walk the seal pipeline without mutating anything."
        type: boolean
        default: false
      bump:
        description: "Force a bump direction (patch/minor/major/none). Blank uses the configured strategy."
        type: string
        required: false
        default: ""
permissions:
  contents: write
concurrency:
  group: seal-${{ github.ref }}
  cancel-in-progress: false
jobs:
  seal:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Mint App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
      - uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7.0.2
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size: 5G
      - name: Configure git identity
        env:
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          user_id=$(gh api "/users/${APP_SLUG}[bot]" --jq .id)
          git config user.name  "${APP_SLUG}[bot]"
          git config user.email "${user_id}+${APP_SLUG}[bot]@users.noreply.github.com"
      - name: Seal
        env:
          DRY_RUN: ${{ inputs.dry-run }}
          BUMP: ${{ inputs.bump }}
        run: |
          set -euo pipefail
          args=()
          if [[ "$DRY_RUN" == "true" ]]; then args+=(--dry-run); fi
          if [[ -n "$BUMP" ]]; then args+=(--bump "$BUMP"); fi
          nix develop --command hanko seal "${args[@]}"

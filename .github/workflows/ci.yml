name: build-publish
on:
  push:
    branches: ['**']
    tags: ['v*']
permissions:
  contents: read
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        env:
          INCLUDE_DARWIN: ${{ startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/master' }}
        run: |
          if [[ "$INCLUDE_DARWIN" == "true" ]]; then
            echo 'matrix={"include":[{"target":"linux-amd64","runs-on":"ubuntu-latest","timeout":20},{"target":"linux-arm64","runs-on":"ubuntu-24.04-arm","timeout":20},{"target":"darwin-arm64","runs-on":"macos-15","timeout":30}]}' >> "$GITHUB_OUTPUT"
          else
            echo 'matrix={"include":[{"target":"linux-amd64","runs-on":"ubuntu-latest","timeout":20},{"target":"linux-arm64","runs-on":"ubuntu-24.04-arm","timeout":20}]}' >> "$GITHUB_OUTPUT"
          fi
  build:
    needs: setup
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: ${{ matrix.timeout }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
      - uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7.0.2
        with:
          primary-key: nix-${{ matrix.target }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}
          restore-prefixes-first-match: nix-${{ matrix.target }}-
          gc-max-store-size: 5G
      - run: nix flake check --print-build-logs
      - name: Build kest
        run: |
          nix build --print-build-logs .#default
          cp ./result/bin/kest kest-${{ matrix.target }}
      - name: Build kestci
        run: |
          nix build --print-build-logs .#kestci -o result-kestci
          cp ./result-kestci/bin/kestci kestci-${{ matrix.target }}
      - name: Build docker image
        if: startsWith(matrix.target, 'linux-')
        run: nix build --print-build-logs .#docker -o result-docker
      - name: Stage docker archive for upload
        if: startsWith(matrix.target, 'linux-') && startsWith(github.ref, 'refs/tags/v')
        run: cp -L result-docker kest-docker-${{ matrix.target }}.tar.gz
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: startsWith(matrix.target, 'linux-') && startsWith(github.ref, 'refs/tags/v')
        with:
          name: kest-docker-${{ matrix.target }}
          path: kest-docker-${{ matrix.target }}.tar.gz
          retention-days: 7
      - name: Compute checksums
        run: shasum -a 256 kest-${{ matrix.target }} kestci-${{ matrix.target }} > checksums-${{ matrix.target }}.txt
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: kestrel-${{ matrix.target }}
          path: |
            kest-${{ matrix.target }}
            kestci-${{ matrix.target }}
            checksums-${{ matrix.target }}.txt
          retention-days: 7
  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: kestrel-*
          merge-multiple: true
      - name: Assemble combined checksums
        run: cat checksums-*.txt | sort > checksums.txt
      - name: Stage install script for upload
        run: cp scripts/install.sh install.sh
      - name: Publish to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          FILES=(
            kest-linux-amd64
            kest-linux-arm64
            kest-darwin-arm64
            kestci-linux-amd64
            kestci-linux-arm64
            kestci-darwin-arm64
            checksums.txt
            install.sh
          )
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "${FILES[@]}" --clobber
          else
            gh release create "$TAG" --generate-notes "${FILES[@]}"
          fi
  publish-image:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # hanko computes the version from tag history
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
      - uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7.0.2
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size: 5G
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: kest-docker-*
          merge-multiple: true
      - name: Publish image to ghcr
        env:
          IMAGE: ghcr.io/${{ github.repository }}
          REGISTRY_USER: ${{ github.actor }}
          REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          nix develop --command bash scripts/deploy-image.sh \
            kest-docker-linux-amd64.tar.gz kest-docker-linux-arm64.tar.gz

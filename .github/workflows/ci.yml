name: build-publish
on:
  push:
    branches: ['**']
    tags: ['v*']
permissions:
  contents: read
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        env:
          INCLUDE_DARWIN: ${{ startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/master' }}
        run: |
          if [[ "$INCLUDE_DARWIN" == "true" ]]; then
            echo 'matrix={"include":[{"target":"linux-amd64","runs-on":"ubuntu-latest","timeout":20},{"target":"linux-arm64","runs-on":"ubuntu-24.04-arm","timeout":20},{"target":"darwin-arm64","runs-on":"macos-15","timeout":30}]}' >> "$GITHUB_OUTPUT"
          else
            echo 'matrix={"include":[{"target":"linux-amd64","runs-on":"ubuntu-latest","timeout":20},{"target":"linux-arm64","runs-on":"ubuntu-24.04-arm","timeout":20}]}' >> "$GITHUB_OUTPUT"
          fi
  build:
    needs: setup
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: ${{ matrix.timeout }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
      - uses: DeterminateSystems/flakehub-cache-action@main
      - run: nix flake check --print-build-logs
      - name: Build kest
        run: |
          nix build --print-build-logs .#default
          cp ./result/bin/kest kest-${{ matrix.target }}
      - name: Build kestci
        run: |
          nix build --print-build-logs .#kestci -o result-kestci
          cp ./result-kestci/bin/kestci kestci-${{ matrix.target }}
      - name: Compute checksums
        run: shasum -a 256 kest-${{ matrix.target }} kestci-${{ matrix.target }} > checksums-${{ matrix.target }}.txt
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: kestrel-${{ matrix.target }}
          path: |
            kest-${{ matrix.target }}
            kestci-${{ matrix.target }}
            checksums-${{ matrix.target }}.txt
          retention-days: 7
  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: kestrel-*
          merge-multiple: true
      - name: Assemble combined checksums
        run: cat checksums-*.txt | sort > checksums.txt
      - name: Stage install script for upload
        run: cp scripts/install.sh install.sh
      - name: Publish to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          FILES=(
            kest-linux-amd64
            kest-linux-arm64
            kest-darwin-arm64
            kestci-linux-amd64
            kestci-linux-arm64
            kestci-darwin-arm64
            checksums.txt
            install.sh
          )
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "${FILES[@]}" --clobber
          else
            gh release create "$TAG" --generate-notes "${FILES[@]}"
          fi

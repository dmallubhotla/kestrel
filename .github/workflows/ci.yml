name: ci
on:
  push:
    branches: ['**']
    tags: ['v*']
permissions:
  contents: read
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
      - run: nix flake check --print-build-logs
      - name: Build kest
        run: |
          nix build --print-build-logs .#default
          cp ./result/bin/kest kest-linux-amd64
      - name: Build kestci
        run: |
          nix build --print-build-logs .#kestci -o result-kestci
          cp ./result-kestci/bin/kestci kestci-linux-amd64
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: kest-linux-amd64
          path: kest-linux-amd64
          retention-days: 7
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: kestci-linux-amd64
          path: kestci-linux-amd64
          retention-days: 7
  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: kest-linux-amd64
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: kestci-linux-amd64
      - name: Publish to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" kest-linux-amd64 kestci-linux-amd64 --clobber
          else
            gh release create "$TAG" --generate-notes kest-linux-amd64 kestci-linux-amd64
          fi
